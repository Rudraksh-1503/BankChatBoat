# This file contains credentials for the chatbot channels

# REST channel (used for frontend / web UI)
rest:

# Rasa X (optional - for UI testing)
rasa:
  url: "http://localhost:5002/api"

# SocketIO (for real-time web chatbot UI)
socketio:
  user_message_evt: user_uttered
  bot_message_evt: bot_uttered
  session_persistence: true

# Facebook (optional - if you want Messenger integration)
# facebook:
#   verify: "<your_verify_token>"
#   secret: "<your_app_secret>"
#   page-access-token: "<your_page_access_token>"

# Slack (optional)
# slack:
#   slack_token: "<your_slack_token>"
#   slack_channel: "<your_channel>"

# Telegram (optional)
# telegram:
#   access_token: "<your_telegram_token>"
#   verify: "<your_bot_name>"
#   webhook_url: "<your_webhook_url>"
